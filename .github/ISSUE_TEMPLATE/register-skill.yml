name: Register a Skill or Agent
description: Register your Skill or Agent with StudyClawHub
title: "register: "
labels: ["register"]
body:
  - type: input
    id: name
    attributes:
      label: Skill name
      description: Kebab-case, e.g. "pagerank-search"
      placeholder: my-awesome-skill
    validations:
      required: true

  - type: input
    id: repo
    attributes:
      label: GitHub repo URL
      description: The repo where your Skill lives
      placeholder: https://github.com/you/your-repo
    validations:
      required: true

  - type: input
    id: path
    attributes:
      label: Path to Skill folder
      description: "If SKILL.md is in the repo root, leave as '.'"
      placeholder: "."
      value: "."

  - type: dropdown
    id: type
    attributes:
      label: Type
      description: Is this a single Skill or an Agent (project with multiple skills)?
      options:
        - skill
        - agent
      default: 0

  - type: input
    id: agent
    attributes:
      label: Agent name
      description: "If this skill belongs to an Agent, enter the Agent's name. Leave empty for standalone skills or agents."
      placeholder: ""

  - type: input
    id: author
    attributes:
      label: Your GitHub username
      placeholder: your-username
    validations:
      required: true
