name: Process Skill Registration / Deletion

on:
  issues:
    types: [opened]

concurrency:
  group: registry-update
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  register:
    if: startsWith(github.event.issue.title, 'register:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse issue and update registry
        run: |
          python3 << 'SCRIPT'
          import json, re, os, sys
          from datetime import datetime, timezone

          body = os.environ.get('ISSUE_BODY', '')
          author_login = os.environ.get('ISSUE_AUTHOR', '')

          # Parse form fields from issue body
          def parse_field(text, field_id):
              pattern = rf'### {field_id}\s*\n\s*(?!###)(.+)'
              m = re.search(pattern, text, re.IGNORECASE)
              if m:
                  val = m.group(1).strip()
                  if val.lower() in ('_no response_', 'n/a', 'none', ''):
                      return ''
                  return val
              # Fallback: look for "field_id\n\nvalue" pattern
              pattern = rf'{field_id}\s*\n\n(.+)'
              m = re.search(pattern, text, re.IGNORECASE)
              if m:
                  val = m.group(1).strip()
                  if val.lower() in ('_no response_', 'n/a', 'none', ''):
                      return ''
                  return val
              return ''

          name = parse_field(body, 'Skill name')
          repo = parse_field(body, 'GitHub repo URL')
          path = parse_field(body, 'Path to Skill folder') or '.'
          entry_type = parse_field(body, 'Type') or 'skill'
          agent_name = parse_field(body, 'Agent name') or ''
          author = parse_field(body, 'Your GitHub username') or author_login
          description = parse_field(body, 'Description') or ''
          version = parse_field(body, 'Version') or ''
          tags_str = parse_field(body, 'Tags') or ''
          tags = [t.strip() for t in tags_str.split(',') if t.strip()] if tags_str else []

          # Normalize type
          entry_type = entry_type.strip().lower()
          if entry_type not in ('skill', 'agent'):
              entry_type = 'skill'

          # Validate
          errors = []
          if not name:
              errors.append('Missing skill name')
          elif not re.match(r'^[a-z0-9][a-z0-9-]*$', name):
              errors.append(f'Invalid name "{name}" — must be kebab-case (lowercase, digits, hyphens)')
          if not repo:
              errors.append('Missing repo URL')
          elif not repo.startswith('https://github.com/'):
              errors.append(f'Invalid repo URL "{repo}" — must be a GitHub URL')
          if not author:
              errors.append('Missing author')

          if errors:
              msg = 'Registration failed:\\n' + '\\n'.join(f'- {e}' for e in errors)
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f'comment={msg}\n')
                  f.write('success=false\n')
              print(msg, file=sys.stderr)
              sys.exit(1)

          # Load registry
          with open('registry.json') as f:
              registry = json.load(f)

          # Build entry
          entry = {
              'name': name,
              'type': entry_type,
              'repo': repo,
              'path': path,
              'author': author,
          }
          if description:
              entry['description'] = description
          if version:
              entry['version'] = version
          if tags:
              entry['tags'] = tags
          if agent_name and entry_type == 'skill':
              # Only set agent if it exists in registry
              agent_exists = any(s['name'] == agent_name and s.get('type') == 'agent' for s in registry['skills'])
              if agent_exists:
                  entry['agent'] = agent_name

          # Check for duplicates
          existing = [s for s in registry['skills'] if s['name'] == name]
          if existing:
              entry['updatedAt'] = datetime.now(timezone.utc).isoformat()
              entry['registeredAt'] = existing[0].get('registeredAt', entry['updatedAt'])
              existing[0].update(entry)
              action = 'updated'
          else:
              entry['registeredAt'] = datetime.now(timezone.utc).isoformat()
              registry['skills'].append(entry)
              action = 'registered'

          with open('registry.json', 'w') as f:
              json.dump(registry, f, indent=2, ensure_ascii=False)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'comment=Successfully {action} **{name}** by @{author}\n')
              f.write('success=true\n')

          print(f'{action}: {name} by @{author}')
          SCRIPT
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        id: register

      - name: Commit registry update
        if: steps.register.outputs.success == 'true'
        run: |
          git config user.name "StudyClawHub Bot"
          git config user.email "bot@studyclawhub"
          git add registry.json
          git commit -m "register: add skill from #${{ github.event.issue.number }}"
          git pull --rebase origin main
          git push

      - name: Trigger index rebuild
        if: steps.register.outputs.success == 'true'
        continue-on-error: true
        run: gh workflow run build-index.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment and close issue
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ steps.register.outputs.success }}' === 'true';
            const body = success
              ? '✅ ${{ steps.register.outputs.comment }}\n\nThe skills index will be rebuilt shortly. Your Skill will appear on the website within a few minutes.'
              : '❌ ${{ steps.register.outputs.comment }}\n\nPlease fix the errors and open a new issue.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

  delete:
    if: startsWith(github.event.issue.title, 'delete:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check repo permission
        id: perms
        run: |
          PERM=$(gh api repos/${{ github.repository }}/collaborators/${{ github.event.issue.user.login }}/permission --jq .permission 2>/dev/null || echo "none")
          echo "permission=$PERM" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse and delete from registry
        run: |
          python3 << 'SCRIPT'
          import json, re, os, sys

          title = os.environ.get('ISSUE_TITLE', '')
          issue_author = os.environ.get('ISSUE_AUTHOR', '')
          repo_permission = os.environ.get('REPO_PERMISSION', 'none')

          # Extract skill name from title "delete: skill-name"
          m = re.match(r'^delete:\s*(.+)$', title.strip(), re.IGNORECASE)
          if not m:
              msg = 'Could not parse skill name from issue title.'
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f'comment={msg}\n')
                  f.write('success=false\n')
              print(msg, file=sys.stderr)
              sys.exit(1)

          name = m.group(1).strip()

          # Load registry
          with open('registry.json') as f:
              registry = json.load(f)

          # Find the entry
          entry = next((s for s in registry['skills'] if s['name'] == name), None)
          if not entry:
              msg = f'Skill **{name}** not found in registry.'
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f'comment={msg}\n')
                  f.write('success=false\n')
              print(msg, file=sys.stderr)
              sys.exit(1)

          # Auth check: must be the author OR have write/admin permission on the repo
          is_admin = repo_permission in ('admin', 'write')
          is_author = issue_author.lower() == entry.get('author', '').lower()
          if not is_admin and not is_author:
              msg = f'Permission denied. Only the author (@{entry.get("author")}) or repo admins can delete **{name}**.'
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f'comment={msg}\n')
                  f.write('success=false\n')
              print(msg, file=sys.stderr)
              sys.exit(1)

          # If deleting an agent, also remove its child skills
          removed = [name]
          if entry.get('type') == 'agent':
              children = [s['name'] for s in registry['skills'] if s.get('agent') == name]
              removed.extend(children)

          registry['skills'] = [s for s in registry['skills'] if s['name'] not in removed]

          with open('registry.json', 'w') as f:
              json.dump(registry, f, indent=2, ensure_ascii=False)

          if len(removed) > 1:
              msg = f'Deleted agent **{name}** and {len(removed)-1} child skill(s): {", ".join(removed[1:])}'
          else:
              msg = f'Deleted **{name}** from registry.'

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'comment={msg}\n')
              f.write('success=true\n')

          print(msg)
          SCRIPT
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          REPO_PERMISSION: ${{ steps.perms.outputs.permission }}
        id: delete

      - name: Commit registry update
        if: steps.delete.outputs.success == 'true'
        run: |
          git config user.name "StudyClawHub Bot"
          git config user.email "bot@studyclawhub"
          git add registry.json
          git commit -m "delete: remove skill from #${{ github.event.issue.number }}"
          git pull --rebase origin main
          git push

      - name: Trigger index rebuild
        if: steps.delete.outputs.success == 'true'
        continue-on-error: true
        run: gh workflow run build-index.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment and close issue
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ steps.delete.outputs.success }}' === 'true';
            const body = success
              ? '✅ ${{ steps.delete.outputs.comment }}'
              : '❌ ${{ steps.delete.outputs.comment }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
