name: Build Skills Index

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Rebuild index every 6 hours to pick up changes in student repos
    - cron: '0 */6 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build skills-index.json
        run: |
          python3 << 'SCRIPT'
          import json, urllib.request, re, sys
          from datetime import datetime, timezone

          def parse_frontmatter(text):
              """Parse simple YAML frontmatter without PyYAML dependency."""
              meta = {}
              current_key = None
              for line in text.strip().splitlines():
                  # YAML list item: "  - value"
                  list_m = re.match(r'^\s+-\s+(.*)', line)
                  if list_m and current_key is not None:
                      if not isinstance(meta[current_key], list):
                          meta[current_key] = []
                      meta[current_key].append(list_m.group(1).strip().strip("'\""))
                      continue
                  # Key-value pair
                  m = re.match(r'^(\w+)\s*:\s*(.*)', line)
                  if not m:
                      current_key = None
                      continue
                  key, val = m.group(1), m.group(2).strip()
                  current_key = key
                  # Empty value — might be followed by list items
                  if not val:
                      meta[key] = ''
                  # Quoted string — return as-is (don't split on commas)
                  elif (val.startswith('"') and val.endswith('"')) or \
                       (val.startswith("'") and val.endswith("'")):
                      meta[key] = val[1:-1]
                  # List values like: [hub, submit]
                  elif val.startswith('[') and val.endswith(']'):
                      meta[key] = [v.strip().strip("'\"") for v in val[1:-1].split(',')]
                  # Unquoted comma-separated → list (e.g. tags: hub, submit)
                  elif ',' in val:
                      meta[key] = [v.strip() for v in val.split(',')]
                  else:
                      meta[key] = val
              return meta

          with open('registry.json') as f:
              registry = json.load(f)

          skills = []
          for entry in registry.get('skills', []):
              repo = entry.get('repo', '')
              path = entry.get('path', '.')
              author = entry.get('author', '')
              name = entry.get('name', '')
              entry_type = entry.get('type', 'skill')

              # Extract owner/repo from URL
              match = re.match(r'https://github\.com/([^/]+/[^/]+)', repo)
              if not match:
                  print(f"Skipping {name}: invalid repo URL", file=sys.stderr)
                  continue

              repo_path = match.group(1)

              # Fetch metadata file: AGENTS.md for agents, SKILL.md for skills
              if entry_type == 'agent':
                  md_file = 'AGENTS.md'
              else:
                  md_file = 'SKILL.md'
              md_url = f"https://raw.githubusercontent.com/{repo_path}/main/{path}/{md_file}"
              meta = {}
              try:
                  req = urllib.request.Request(md_url, headers={'User-Agent': 'StudyClawHub-Bot'})
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      content = resp.read().decode('utf-8')
                  fm_match = re.match(r'^---\s*\n(.*?)\n---\s*\n(.*)', content, re.DOTALL)
                  if fm_match:
                      meta = parse_frontmatter(fm_match.group(1))
              except Exception as e:
                  # Use metadata from registry.json as fallback (e.g. private repos)
                  if entry.get('description'):
                      print(f"{name}: using registry metadata (could not fetch {md_file})")
                  else:
                      print(f"Skipping {name}: could not fetch {md_file} and no registry metadata", file=sys.stderr)
                      continue

              # Fetch star count from GitHub API
              stars = 0
              try:
                  api_url = f"https://api.github.com/repos/{repo_path}"
                  req = urllib.request.Request(api_url, headers={
                      'User-Agent': 'StudyClawHub-Bot',
                      'Accept': 'application/vnd.github.v3+json'
                  })
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      repo_data = json.loads(resp.read().decode('utf-8'))
                      stars = repo_data.get('stargazers_count', 0)
              except:
                  pass

              skill_name = meta.get("name", name)
              entry_type = entry.get("type", "skill")
              skill_entry = {
                  "name": skill_name,
                  "type": entry_type,
                  "description": meta.get("description", entry.get("description", "")),
                  "author": meta.get("author", author),
                  "version": meta.get("version", entry.get("version", "1.0.0")),
                  "tags": meta.get("tags", entry.get("tags", [])),
                  "repo": repo,
                  "repo_name": repo_path.split('/')[-1],
                  "path": path,
                  "registeredAt": entry.get("registeredAt", ""),
                  "stars": stars,
              }
              if entry.get("agent"):
                  skill_entry["agent"] = entry["agent"]
              skills.append(skill_entry)

              print(f"Indexed: {meta.get('name', name)} by @{meta.get('author', author)}")

          index = {
              "version": 1,
              "generatedAt": datetime.now(timezone.utc).isoformat(),
              "count": len(skills),
              "skills": skills
          }

          with open('skills-index.json', 'w') as f:
              json.dump(index, f, indent=2, ensure_ascii=False)

          print(f"\nDone: {len(skills)} skills indexed.")
          SCRIPT

      - name: Copy index to site
        run: cp skills-index.json site/skills-index.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
