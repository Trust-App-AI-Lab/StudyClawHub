name: Build Skills Index

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Rebuild index every 6 hours to pick up changes in student repos
    - cron: '0 */6 * * *'

permissions:
  contents: write
  pages: write
  id-token: write
  issues: read

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch install counts
        run: |
          gh issue list --repo "$GITHUB_REPOSITORY" --label install \
            --state all --limit 9999 --json title \
            --jq '.[].title' > /tmp/install-titles.txt 2>/dev/null || true

          python3 << 'COUNTS'
          import json
          from collections import Counter

          counts = Counter()
          try:
              with open('/tmp/install-titles.txt') as f:
                  for line in f:
                      line = line.strip()
                      if line.startswith('install: '):
                          counts[line[len('install: '):]] += 1
          except FileNotFoundError:
              pass

          with open('/tmp/install-counts.json', 'w') as f:
              json.dump(dict(counts), f)
          print(f"Install counts: {len(counts)} skills tracked")
          COUNTS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build skills-index.json
        run: |
          python3 << 'SCRIPT'
          import json, urllib.request, re, sys
          from datetime import datetime, timezone

          def parse_frontmatter(text):
              """Parse simple YAML frontmatter without PyYAML dependency."""
              meta = {}
              for line in text.strip().splitlines():
                  m = re.match(r'^(\w+)\s*:\s*(.*)', line)
                  if not m:
                      continue
                  key, val = m.group(1), m.group(2).strip()
                  # Quoted string — return as-is (don't split on commas)
                  if (val.startswith('"') and val.endswith('"')) or \
                     (val.startswith("'") and val.endswith("'")):
                      meta[key] = val[1:-1]
                  # List values like: [hub, submit]
                  elif val.startswith('[') and val.endswith(']'):
                      meta[key] = [v.strip().strip("'\"") for v in val[1:-1].split(',')]
                  # Unquoted comma-separated → list (e.g. tags: hub, submit)
                  elif ',' in val:
                      meta[key] = [v.strip() for v in val.split(',')]
                  else:
                      meta[key] = val
              return meta

          with open('registry.json') as f:
              registry = json.load(f)

          try:
              with open('/tmp/install-counts.json') as f:
                  install_counts = json.load(f)
          except:
              install_counts = {}

          skills = []
          for entry in registry.get('skills', []):
              repo = entry.get('repo', '')
              path = entry.get('path', '.')
              author = entry.get('author', '')
              name = entry.get('name', '')

              # Fetch SKILL.md from student's repo via GitHub raw
              # Extract owner/repo from URL
              match = re.match(r'https://github\.com/([^/]+/[^/]+)', repo)
              if not match:
                  print(f"Skipping {name}: invalid repo URL", file=sys.stderr)
                  continue

              repo_path = match.group(1)
              skill_md_url = f"https://raw.githubusercontent.com/{repo_path}/main/{path}/SKILL.md"

              try:
                  req = urllib.request.Request(skill_md_url, headers={'User-Agent': 'StudyClawHub-Bot'})
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      content = resp.read().decode('utf-8')
              except Exception as e:
                  print(f"Skipping {name}: could not fetch SKILL.md: {e}", file=sys.stderr)
                  continue

              # Parse YAML frontmatter
              fm_match = re.match(r'^---\s*\n(.*?)\n---\s*\n(.*)', content, re.DOTALL)
              if not fm_match:
                  print(f"Skipping {name}: no frontmatter found", file=sys.stderr)
                  continue

              try:
                  meta = parse_frontmatter(fm_match.group(1))
              except Exception as e:
                  print(f"Skipping {name}: frontmatter parse error: {e}", file=sys.stderr)
                  continue

              # Fetch star count from GitHub API
              stars = 0
              try:
                  api_url = f"https://api.github.com/repos/{repo_path}"
                  req = urllib.request.Request(api_url, headers={
                      'User-Agent': 'StudyClawHub-Bot',
                      'Accept': 'application/vnd.github.v3+json'
                  })
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      repo_data = json.loads(resp.read().decode('utf-8'))
                      stars = repo_data.get('stargazers_count', 0)
              except:
                  pass

              skill_name = meta.get("name", name)
              skills.append({
                  "name": skill_name,
                  "description": meta.get("description", ""),
                  "author": meta.get("author", author),
                  "version": meta.get("version", "1.0.0"),
                  "tags": meta.get("tags", []),
                  "repo": repo,
                  "repo_name": repo_path.split('/')[-1],
                  "path": path,
                  "registeredAt": entry.get("registeredAt", ""),
                  "stars": stars,
                  "installs": install_counts.get(skill_name, 0),
              })

              print(f"Indexed: {meta.get('name', name)} by @{meta.get('author', author)}")

          index = {
              "version": 1,
              "generatedAt": datetime.now(timezone.utc).isoformat(),
              "count": len(skills),
              "skills": skills
          }

          with open('skills-index.json', 'w') as f:
              json.dump(index, f, indent=2, ensure_ascii=False)

          print(f"\nDone: {len(skills)} skills indexed.")
          SCRIPT

      - name: Copy index to site
        run: cp skills-index.json site/skills-index.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
